backend:
  name: git-gateway
  branch: master

site_url: "https://blog-ngetehnology.netlify.app"
display_url: "https://blog-ngetehnology.netlify.app"
logo_url: "/assets/images/logos.png"
publish_mode: simple

local_backend:
  url: http://127.0.0.1:8081/api/v1
  allowed_hosts: ["127.0.0.1", "localhost"]

media_folder: "public/assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} - {{published}}"
    sortable_fields: ["published", "updated", "title"]
    path: "{{slug}}/index"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", required: false, hint: "Opsional. Kalau diisi, URL post akan mengikuti slug ini, sesuai docs Firefly." }
      - { label: "Publish Date", name: "published", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated Date", name: "updated", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false, allow_multiple: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Pinned", name: "pinned", widget: "boolean", default: false, required: false }
      - { label: "Language", name: "lang", widget: "select", default: "id", required: false, options: ["id", "en"] }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Series", name: "series", widget: "string", required: false }
      - { label: "Source Link", name: "sourceLink", widget: "string", required: false }
      - { label: "License Name", name: "licenseName", widget: "string", required: false }
      - { label: "License URL", name: "licenseUrl", widget: "string", required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Ikuti Firefly writing docs: Markdown/MDX, ```mermaid, $...$/$$...$$, > [!NOTE], :::tip, :spoiler[], iframe YouTube/Bilibili, dan ::github{repo=\"owner/repo\"}."
        modes: ["rich_text", "raw"]
        buttons:
          - heading-one
          - bold
          - italic
          - strikethrough
          - code
          - link
          - heading-two
          - heading-three
          - heading-four
          - quote
          - bulleted-list
          - numbered-list
        editor_components: ["image", "code-block", "admonition", "details", "youtube", "bilibili", "github-card"]
        sanitize_preview: true

  - name: "pages"
    label: "Static Pages"
    editor:
      preview: true
    files:
      - label: "About Page"
        name: "about_page"
        file: "src/content/spec/about.md"
        fields:
          - label: "Body"
            name: "body"
            widget: "markdown"
            required: false
            hint: "Preview mengikuti syntax Firefly: markdown, callout, Mermaid, KaTeX, spoiler, iframe, dan GitHub card."
            modes: ["rich_text", "raw"]
            buttons:
              - heading-one
              - bold
              - italic
              - strikethrough
              - code
              - link
              - heading-two
              - heading-three
              - heading-four
              - quote
              - bulleted-list
              - numbered-list
            editor_components: ["image", "code-block", "admonition", "details", "youtube", "bilibili", "github-card"]
            sanitize_preview: true
      - label: "Friends Page"
        name: "friends_page"
        file: "src/content/spec/friends.md"
        fields:
          - label: "Body"
            name: "body"
            widget: "markdown"
            required: false
            hint: "Preview mengikuti syntax Firefly: markdown, callout, Mermaid, KaTeX, spoiler, iframe, dan GitHub card."
            modes: ["rich_text", "raw"]
            buttons:
              - heading-one
              - bold
              - italic
              - strikethrough
              - code
              - link
              - heading-two
              - heading-three
              - heading-four
              - quote
              - bulleted-list
              - numbered-list
            editor_components: ["image", "code-block", "admonition", "details", "youtube", "bilibili", "github-card"]
            sanitize_preview: true

  - name: "site"
    label: "Site"
    editor:
      preview: false
    files:
      - label: "Site Metadata"
        name: "site_metadata"
        file: "src/data/site-metadata.json"
        format: "json"
        fields:
          - { label: "Language", name: "lang", widget: "select", options: ["id", "en"] }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - label: "Keywords"
            name: "keywords"
            widget: "list"
            required: false
            field: { label: "Keyword", name: "keyword", widget: "string" }
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - { label: "Logo Source", name: "src", widget: "image", allow_multiple: false }
              - { label: "Logo Alt", name: "alt", widget: "string", required: false }
          - label: "Favicon"
            name: "favicon"
            widget: "object"
            fields:
              - { label: "Favicon Source", name: "src", widget: "image", allow_multiple: false }
              - { label: "Sizes", name: "sizes", widget: "string", required: false }

      - label: "Site Settings"
        name: "site_settings"
        file: "src/data/site-settings.json"
        format: "json"
        fields:
          - label: "Theme Color"
            name: "themeColor"
            widget: "object"
            fields:
              - { label: "Hue", name: "hue", widget: "number", value_type: "int", min: 0, max: 360 }
              - { label: "Fixed", name: "fixed", widget: "boolean", required: false }
              - { label: "Default Mode", name: "defaultMode", widget: "select", options: ["system", "light", "dark"] }
          - label: "Bangumi"
            name: "bangumi"
            widget: "object"
            required: false
            fields:
              - { label: "User ID", name: "userId", widget: "string", required: false }
          - { label: "Show Last Modified", name: "showLastModified", widget: "boolean", required: false }
          - { label: "Generate OG Images", name: "generateOgImages", widget: "boolean", required: false }
          - label: "Pages"
            name: "pages"
            widget: "object"
            fields:
              - { label: "Anime", name: "anime", widget: "boolean", required: false }
              - { label: "Projects", name: "projects", widget: "boolean", required: false }
              - { label: "Timeline", name: "timeline", widget: "boolean", required: false }
              - { label: "Skills", name: "skills", widget: "boolean", required: false }
          - label: "Post List Layout"
            name: "postListLayout"
            widget: "object"
            fields:
              - { label: "Default Mode", name: "defaultMode", widget: "select", options: ["list", "grid"] }
              - { label: "Allow Switch", name: "allowSwitch", widget: "boolean", required: false }
          - label: "Pagination"
            name: "pagination"
            widget: "object"
            fields:
              - { label: "Posts Per Page", name: "postsPerPage", widget: "number", value_type: "int", min: 1 }
          - label: "TOC"
            name: "toc"
            widget: "object"
            fields:
              - { label: "Enable TOC", name: "enable", widget: "boolean", required: false }
              - { label: "Depth", name: "depth", widget: "select", options: [1, 2, 3] }

      - label: "Profile"
        name: "profile"
        file: "src/data/profile.json"
        format: "json"
        fields:
          - { label: "Avatar", name: "avatar", widget: "image", required: false, allow_multiple: false }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text", required: false }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Announcement"
        name: "announcement"
        file: "src/data/announcement.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Content", name: "content", widget: "text" }
          - { label: "Closable", name: "closable", widget: "boolean", required: false }
          - label: "Link"
            name: "link"
            widget: "object"
            required: false
            fields:
              - { label: "Enable", name: "enable", widget: "boolean", required: false }
              - { label: "Text", name: "text", widget: "string", required: false }
              - { label: "URL", name: "url", widget: "string", required: false }
              - { label: "External", name: "external", widget: "boolean", required: false }

      - label: "Post Taxonomy"
        name: "post_taxonomy"
        file: "src/data/post-taxonomy.json"
        format: "json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            field: { label: "Category", name: "category", widget: "string" }
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }

  - name: "navigation"
    label: "Navigation"
    editor:
      preview: false
    files:
      - label: "Navbar Links"
        name: "navbar_links"
        file: "src/data/navbar-links.json"
        format: "json"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string", required: false }
              - { label: "External", name: "external", widget: "boolean", required: false }
              - label: "Children"
                name: "children"
                widget: "list"
                required: false
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
                  - { label: "Icon", name: "icon", widget: "string", required: false }
                  - { label: "External", name: "external", widget: "boolean", required: false }

      - label: "Sidebar Layout"
        name: "sidebar_layout"
        file: "src/data/sidebar-layout.json"
        format: "json"
        fields:
          - { label: "Enable Sidebar", name: "enable", widget: "boolean", required: false }
          - { label: "Position", name: "position", widget: "select", options: ["left", "right", "both"] }
          - { label: "Tablet Sidebar", name: "tabletSidebar", widget: "select", required: false, options: ["left", "right"] }
          - { label: "Show Both Sidebars On Post Page", name: "showBothSidebarsOnPostPage", widget: "boolean", required: false }

          - label: "Left Components"
            name: "leftComponents"
            widget: "list"
            summary: "{{fields.type}}"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["profile", "announcement", "categories", "tags", "music", "stats", "calendar", "sidebarToc", "advertisement", "custom", "toc", "site-stats", "music-player"] }
              - { label: "Enable", name: "enable", widget: "boolean", required: false }
              - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
              - { label: "Position", name: "position", widget: "select", options: ["top", "sticky"] }
              - { label: "Show On Post Page", name: "showOnPostPage", widget: "boolean", required: false }
              - { label: "Show On Non Post Page", name: "showOnNonPostPage", widget: "boolean", required: false }
              - { label: "Class", name: "class", widget: "string", required: false }
              - { label: "Style", name: "style", widget: "string", required: false }
              - { label: "Animation Delay", name: "animationDelay", widget: "number", value_type: "int", required: false, min: 0 }
              - { label: "Config ID", name: "configId", widget: "string", required: false }
              - label: "Responsive"
                name: "responsive"
                widget: "object"
                required: false
                fields:
                  - label: "Hidden"
                    name: "hidden"
                    widget: "list"
                    required: false
                    field: { label: "Device", name: "device", widget: "select", options: ["mobile", "tablet", "desktop"] }
                  - { label: "Collapse Threshold", name: "collapseThreshold", widget: "number", value_type: "int", required: false, min: 1 }

          - label: "Right Components"
            name: "rightComponents"
            widget: "list"
            summary: "{{fields.type}}"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["profile", "announcement", "categories", "tags", "music", "stats", "calendar", "sidebarToc", "advertisement", "custom", "toc", "site-stats", "music-player"] }
              - { label: "Enable", name: "enable", widget: "boolean", required: false }
              - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
              - { label: "Position", name: "position", widget: "select", options: ["top", "sticky"] }
              - { label: "Show On Post Page", name: "showOnPostPage", widget: "boolean", required: false }
              - { label: "Show On Non Post Page", name: "showOnNonPostPage", widget: "boolean", required: false }
              - { label: "Class", name: "class", widget: "string", required: false }
              - { label: "Style", name: "style", widget: "string", required: false }
              - { label: "Animation Delay", name: "animationDelay", widget: "number", value_type: "int", required: false, min: 0 }
              - { label: "Config ID", name: "configId", widget: "string", required: false }
              - label: "Responsive"
                name: "responsive"
                widget: "object"
                required: false
                fields:
                  - label: "Hidden"
                    name: "hidden"
                    widget: "list"
                    required: false
                    field: { label: "Device", name: "device", widget: "select", options: ["mobile", "tablet", "desktop"] }
                  - { label: "Collapse Threshold", name: "collapseThreshold", widget: "number", value_type: "int", required: false, min: 1 }

          - label: "Mobile Bottom Components"
            name: "mobileBottomComponents"
            widget: "list"
            required: false
            summary: "{{fields.type}}"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["profile", "announcement", "categories", "tags", "music", "stats", "calendar", "sidebarToc", "advertisement", "custom", "toc", "site-stats", "music-player"] }
              - { label: "Enable", name: "enable", widget: "boolean", required: false }
              - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
              - { label: "Position", name: "position", widget: "select", options: ["top", "sticky"] }
              - { label: "Show On Post Page", name: "showOnPostPage", widget: "boolean", required: false }
              - { label: "Show On Non Post Page", name: "showOnNonPostPage", widget: "boolean", required: false }
              - { label: "Class", name: "class", widget: "string", required: false }
              - { label: "Style", name: "style", widget: "string", required: false }
              - { label: "Animation Delay", name: "animationDelay", widget: "number", value_type: "int", required: false, min: 0 }
              - { label: "Config ID", name: "configId", widget: "string", required: false }
              - label: "Responsive"
                name: "responsive"
                widget: "object"
                required: false
                fields:
                  - { label: "Collapse Threshold", name: "collapseThreshold", widget: "number", value_type: "int", required: false, min: 1 }
          - label: "Default Animation"
            name: "defaultAnimation"
            widget: "object"
            fields:
              - { label: "Enable", name: "enable", widget: "boolean", required: false }
              - { label: "Base Delay", name: "baseDelay", widget: "number", value_type: "int", min: 0 }
              - { label: "Increment", name: "increment", widget: "number", value_type: "int", min: 0 }
          - label: "Responsive"
            name: "responsive"
            widget: "object"
            fields:
              - label: "Breakpoints"
                name: "breakpoints"
                widget: "object"
                fields:
                  - { label: "Mobile", name: "mobile", widget: "number", value_type: "int", min: 0 }
                  - { label: "Tablet", name: "tablet", widget: "number", value_type: "int", min: 0 }
                  - { label: "Desktop", name: "desktop", widget: "number", value_type: "int", min: 0 }
              - label: "Layout"
                name: "layout"
                widget: "object"
                fields:
                  - { label: "Mobile", name: "mobile", widget: "select", options: ["hidden", "bottom", "drawer", "sidebar"] }
                  - { label: "Tablet", name: "tablet", widget: "select", options: ["sidebar", "bottom", "drawer"] }
                  - { label: "Desktop", name: "desktop", widget: "select", options: ["sidebar"] }

  - name: "community"
    label: "Community"
    editor:
      preview: false
    files:
      - label: "Friends"
        name: "friends"
        file: "src/data/friends.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "imgurl", widget: "image", allow_multiple: false }
              - { label: "Description", name: "desc", widget: "text", required: false }
              - { label: "Site URL", name: "siteurl", widget: "string" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Tag", name: "tag", widget: "string" }
              - { label: "Weight", name: "weight", widget: "number", value_type: "int", min: 0 }
              - { label: "Enabled", name: "enabled", widget: "boolean", required: false }

      - label: "Comment Settings"
        name: "comment_settings"
        file: "src/data/comment.json"
        format: "json"
        fields:
          - { label: "Enable Comments", name: "enable", widget: "boolean", required: false }
          - { label: "Enable Visitor Count", name: "enableVisitorCount", widget: "boolean", required: false }
          - label: "Twikoo"
            name: "twikoo"
            widget: "object"
            required: false
            fields:
              - { label: "Env ID", name: "envId", widget: "string", required: false }
              - { label: "Region", name: "region", widget: "string", required: false }
              - { label: "Language", name: "lang", widget: "string", required: false }

  - name: "appearance"
    label: "Appearance"
    editor:
      preview: false
    files:
      - label: "Wallpaper"
        name: "wallpaper"
        file: "src/data/wallpaper.json"
        format: "json"
        fields:
          - { label: "Enable", name: "enable", widget: "boolean", required: false }
          - { label: "Switchable", name: "switchable", widget: "boolean", required: false }
          - { label: "Mode", name: "mode", widget: "select", options: ["banner", "overlay"] }
          - label: "Image Sources"
            name: "src"
            widget: "object"
            fields:
              - label: "Desktop"
                name: "desktop"
                widget: "list"
                summary: "{{fields.image}}"
                field: { label: "Image", name: "image", widget: "image", allow_multiple: false }
              - label: "Mobile"
                name: "mobile"
                widget: "list"
                summary: "{{fields.image}}"
                field: { label: "Image", name: "image", widget: "image", allow_multiple: false }
          - { label: "Position", name: "position", widget: "string", required: false }
          - label: "Banner"
            name: "banner"
            widget: "object"
            fields:
              - label: "Home Text"
                name: "homeText"
                widget: "object"
                fields:
                  - { label: "Enable", name: "enable", widget: "boolean", required: false }
                  - { label: "Switchable", name: "switchable", widget: "boolean", required: false }
                  - { label: "Title", name: "title", widget: "string", required: false }
                  - { label: "Title Size", name: "titleSize", widget: "string", required: false }
                  - label: "Subtitles"
                    name: "subtitle"
                    widget: "list"
                    required: false
                    field: { label: "Subtitle", name: "subtitle", widget: "string" }
                  - { label: "Subtitle Size", name: "subtitleSize", widget: "string", required: false }
                  - label: "Typewriter"
                    name: "typewriter"
                    widget: "object"
                    fields:
                      - { label: "Enable", name: "enable", widget: "boolean", required: false }
                      - { label: "Speed", name: "speed", widget: "number", value_type: "int", min: 0 }
                      - { label: "Delete Speed", name: "deleteSpeed", widget: "number", value_type: "int", min: 0 }
                      - { label: "Pause Time", name: "pauseTime", widget: "number", value_type: "int", min: 0 }
              - label: "Credit"
                name: "credit"
                widget: "object"
                fields:
                  - label: "Enable"
                    name: "enable"
                    widget: "object"
                    fields:
                      - { label: "Desktop", name: "desktop", widget: "boolean", required: false }
                      - { label: "Mobile", name: "mobile", widget: "boolean", required: false }
                  - label: "Text"
                    name: "text"
                    widget: "object"
                    fields:
                      - { label: "Desktop", name: "desktop", widget: "string", required: false }
                      - { label: "Mobile", name: "mobile", widget: "string", required: false }
                  - label: "URL"
                    name: "url"
                    widget: "object"
                    fields:
                      - { label: "Desktop", name: "desktop", widget: "string", required: false }
                      - { label: "Mobile", name: "mobile", widget: "string", required: false }
              - label: "Navbar"
                name: "navbar"
                widget: "object"
                fields:
                  - { label: "Transparent Mode", name: "transparentMode", widget: "select", options: ["semi", "full", "semifull"] }
              - label: "Animation"
                name: "animation"
                widget: "object"
                required: false
                fields:
                  - { label: "Enable", name: "enable", widget: "boolean", required: false }
                  - { label: "Scope", name: "scope", widget: "select", options: ["global"], required: false }
                  - { label: "Restart On Route Change", name: "restartOnRouteChange", widget: "boolean", required: false }
                  - label: "Home Preset"
                    name: "homePreset"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Duration", name: "duration", widget: "number", value_type: "int", min: 1000, required: false }
                      - { label: "Scale From", name: "scaleFrom", widget: "number", value_type: "float", min: 1, step: 0.01, required: false }
                      - { label: "Scale To", name: "scaleTo", widget: "number", value_type: "float", min: 1, step: 0.01, required: false }
                      - { label: "Offset Strength", name: "offsetStrength", widget: "number", value_type: "float", min: 0, step: 0.1, required: false }
                  - label: "Inner Preset"
                    name: "innerPreset"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Duration", name: "duration", widget: "number", value_type: "int", min: 1000, required: false }
                      - { label: "Scale From", name: "scaleFrom", widget: "number", value_type: "float", min: 1, step: 0.01, required: false }
                      - { label: "Scale To", name: "scaleTo", widget: "number", value_type: "float", min: 1, step: 0.01, required: false }
                      - { label: "Offset Strength", name: "offsetStrength", widget: "number", value_type: "float", min: 0, step: 0.1, required: false }
              - label: "Carousel"
                name: "carousel"
                widget: "object"
                required: false
                fields:
                  - { label: "Enable", name: "enable", widget: "boolean", required: false }
                  - { label: "Interval", name: "interval", widget: "number", value_type: "int", min: 3000, required: false }
                  - { label: "Switchable", name: "switchable", widget: "boolean", required: false }
              - label: "Waves"
                name: "waves"
                widget: "object"
                fields:
                  - label: "Enable"
                    name: "enable"
                    widget: "object"
                    fields:
                      - { label: "Desktop", name: "desktop", widget: "boolean", required: false }
                      - { label: "Mobile", name: "mobile", widget: "boolean", required: false }
                  - { label: "Switchable", name: "switchable", widget: "boolean", required: false }
                  - { label: "Style", name: "style", widget: "select", options: ["contrast", "soft"], required: false }
